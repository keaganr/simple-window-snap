name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-sign-notarize:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select newest available Xcode
        run: |
          LATEST_XCODE=$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)
          echo "Selecting $LATEST_XCODE"
          sudo xcode-select -s "$LATEST_XCODE"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Import Developer ID certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')

      - name: Archive
        run: |
          xcodebuild -project SimpleWindowSnap.xcodeproj -scheme SimpleWindowSnap \
            -configuration Release archive -archivePath build/SimpleWindowSnap.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM=GK5YMCRFZN \
            ENABLE_HARDENED_RUNTIME=YES

      - name: Export signed .app
        run: |
          xcodebuild -exportArchive -archivePath build/SimpleWindowSnap.xcarchive \
            -exportPath build/export -exportOptionsPlist ExportOptions.plist

      - name: Zip for notarization
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          ZIP_PATH="build/SimpleWindowSnap-$VERSION.zip"
          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"
          ditto -c -k --keepParent "build/export/Simple Window Snap.app" "$ZIP_PATH"

      - name: Notarize
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p private_keys
          echo -n "$APPLE_API_KEY_BASE64" | base64 --decode -o "private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"

          xcrun notarytool submit "${{ steps.version.outputs.zip_path }}" \
            --key "private_keys/AuthKey_${APPLE_API_KEY_ID}.p8" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --wait

      - name: Staple and re-zip
        run: |
          xcrun stapler staple "build/export/Simple Window Snap.app"
          rm -f "${{ steps.version.outputs.zip_path }}"
          ditto -c -k --keepParent "build/export/Simple Window Snap.app" "${{ steps.version.outputs.zip_path }}"

      - name: Verify Gatekeeper acceptance
        run: spctl -a -vvv -t install "build/export/Simple Window Snap.app"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" "${{ steps.version.outputs.zip_path }}" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/signing.keychain-db" || true
